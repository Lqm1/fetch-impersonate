name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx scripts/prepare-native.ts --target linux-x64-gnu
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:target-parity
      - run: pnpm check:package-metadata
      - run: pnpm exec tsx scripts/check-bindings.ts --target linux-x64-gnu
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p fetch-impersonate-native --no-default-features --features native-stub -- -D warnings
