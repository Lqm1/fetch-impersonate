name: Release npm packages

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  build-native:
    uses: ./.github/workflows/build-native.yml

  publish:
    name: Publish native packages, then root package
    needs: build-native
    runs-on: ubuntu-24.04
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:package-metadata
      - name: Verify tag and package versions match
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: .artifacts/release-native
          merge-multiple: true
      - name: Verify all native tarballs are present
        shell: bash
        run: |
          EXPECTED="$(node -e "const t=require('./native-targets.json'); console.log(Object.keys(t).filter(k => !k.startsWith('$')).length)")"
          ACTUAL="$(find .artifacts/release-native -maxdepth 1 -name '*.tgz' -type f | wc -l)"
          test "$ACTUAL" = "$EXPECTED"
      - run: pnpm build
      - name: Pack root package
        shell: bash
        run: |
          mkdir -p .artifacts/release-root
          npm pack --ignore-scripts --pack-destination .artifacts/release-root
      - name: Publish platform packages
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          case "$VERSION" in
            *-alpha.*) DIST_TAG="alpha" ;;
            *-beta.*)  DIST_TAG="beta"  ;;
            *-rc.*)    DIST_TAG="rc"    ;;
            *)         DIST_TAG="latest" ;;
          esac
          echo "Publishing channel: $DIST_TAG (version $VERSION)"
          for package in .artifacts/release-native/*.tgz; do
            npm stage publish "$package" --access public --ignore-scripts --tag "$DIST_TAG"
          done
      - name: Publish root package last
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          case "$VERSION" in
            *-alpha.*) DIST_TAG="alpha" ;;
            *-beta.*)  DIST_TAG="beta"  ;;
            *-rc.*)    DIST_TAG="rc"    ;;
            *)         DIST_TAG="latest" ;;
          esac
          echo "Publishing root package channel: $DIST_TAG (version $VERSION)"
          npm stage publish .artifacts/release-root/*.tgz --access public --ignore-scripts --tag "$DIST_TAG"